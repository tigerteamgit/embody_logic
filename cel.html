<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Creative Expansion Lab</title>

<style>
/* ---- Base ---- */
body{
  font-family: system-ui, -apple-system, sans-serif;
  background:#0f172a;
  color:#e2e8f0;
  margin:0;
  padding:40px;
}

.container{
  max-width:800px;
  margin:auto;
}

.card{
  background:#1e293b;
  padding:24px;
  border-radius:12px;
  margin-bottom:24px;
}

select, button{
  padding:10px 14px;
  border-radius:8px;
  border:none;
  font-size:14px;
}

.btn-primary{
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.btn-soft{
  background:#334155;
  color:#e2e8f0;
  cursor:pointer;
}

.btn-outline{
  background:transparent;
  border:1px solid #475569;
  color:#e2e8f0;
  cursor:pointer;
}

.hidden{
  display:none;
}

.spacer{
  height:16px;
}

canvas{
  background:white;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">

    <h2>Creative Expansion Lab</h2>

    <!-- Attempt Type -->
    <label>Attempt Type</label>
    <div class="spacer"></div>
    <select id="attemptType">
      <option value="baseline">Baseline</option>
      <option value="post">Post</option>
    </select>

    <!-- Upload Baseline (Appears only for Post) -->
    <div id="baselineUploadWrapper" class="hidden" style="margin-top:16px;">
      <label for="baselineFile" class="btn-soft" style="cursor:pointer;">
        Upload Baseline File
      </label>
      <input type="file" id="baselineFile" accept=".json" class="hidden" />
    </div>

    <div class="spacer"></div>

    <button id="startLabBtn" class="btn-primary">Start Lab</button>

    <div class="spacer"></div>

    <button id="exportBtn" class="btn-outline">Export File</button>

  </div>

  <div class="card">
    <h3>Results</h3>
    <p style="opacity:.7;">
      Scores are stored locally on this device. Export a file if you want your results portable.
    </p>

    <canvas id="resultsChart" height="200"></canvas>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
"use strict";

/* ---- Storage ---- */
const STORAGE_KEY = "cel_attempts";

/* ---- Safe Bind ---- */
function safeBindClick(id, handler){
  const el = document.getElementById(id);
  if(el){
    el.addEventListener("click", handler);
  }
}

/* ---- Load Attempts ---- */
function loadAttempts(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}

/* ---- Save Attempt ---- */
function saveAttempt(attempt){
  const attempts = loadAttempts();
  attempts.push(attempt);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(attempts));
}

/* ---- Export File (JSON) ---- */
function exportFile(){
  const attempts = loadAttempts();
  if(attempts.length === 0){
    alert("No attempts stored yet.");
    return;
  }

  const json = JSON.stringify(attempts, null, 2);
  const blob = new Blob([json], { type:"application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `creative-expansion-lab_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();

  URL.revokeObjectURL(url);
}

/* ---- Upload Baseline ---- */
let uploadedBaseline = null;

document.getElementById("baselineFile").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(evt){
    try{
      uploadedBaseline = JSON.parse(evt.target.result);
      alert("Baseline file loaded successfully.");
      renderChart();
    }catch(err){
      alert("Invalid JSON file.");
    }
  };
  reader.readAsText(file);
});

/* ---- Attempt Toggle Logic ---- */
const attemptSelect = document.getElementById("attemptType");
const baselineWrapper = document.getElementById("baselineUploadWrapper");

attemptSelect.addEventListener("change", ()=>{
  if(attemptSelect.value === "post"){
    baselineWrapper.classList.remove("hidden");
  }else{
    baselineWrapper.classList.add("hidden");
  }
});

/* ---- Mock Lab Execution ---- */
function runLab(){
  const attemptType = attemptSelect.value;

  const result = {
    type: attemptType,
    timestamp: Date.now(),
    somatic: Math.floor(Math.random()*100),
    creative: Math.floor(Math.random()*100)
  };

  saveAttempt(result);
  renderChart();
}

/* ---- Chart ---- */
let chartInstance = null;

function renderChart(){
  const ctx = document.getElementById("resultsChart");

  const attempts = loadAttempts();
  const latest = attempts[attempts.length - 1];

  if(!latest) return;

  let labels = ["Somatic","Creative"];
  let datasets = [];

  // Baseline from upload
  if(uploadedBaseline && uploadedBaseline.length){
    const base = uploadedBaseline.find(a=>a.type==="baseline");
    if(base){
      datasets.push({
        label:"Baseline",
        data:[base.somatic, base.creative]
      });
    }
  }

  // Latest attempt
  datasets.push({
    label:latest.type,
    data:[latest.somatic, latest.creative]
  });

  if(chartInstance){
    chartInstance.destroy();
  }

  chartInstance = new Chart(ctx,{
    type:"bar",
    data:{
      labels,
      datasets
    },
    options:{
      responsive:true,
      plugins:{
        legend:{display:true}
      }
    }
  });
}

/* ---- Bind Buttons ---- */
safeBindClick("startLabBtn", runLab);
safeBindClick("exportBtn", exportFile);

/* ---- Initial Render ---- */
renderChart();

</script>
</body>
</html>
